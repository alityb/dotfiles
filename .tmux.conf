# ===================================================================
# TMUX Configuration
# ===================================================================

# ===== Prefix Key =====
# Use C-a locally, C-b when SSH'd
if-shell 'test -n "$SSH_CLIENT"' \
  'set -g prefix C-b; unbind C-a; bind C-b send-prefix' \
  'set -g prefix C-a; unbind C-b; bind C-a send-prefix'

# ===== General Settings =====
set -g mouse on
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm*:Tc"
set -g focus-events on
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename off

# ===== Key Bindings =====
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-tmux-navigator handles Ctrl-hjkl seamlessly with vim)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Sesh session switcher
bind T run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 55%,40% \
    --no-sort --ansi \
    --color 'border:#7aa2f7,label:#7aa2f7,prompt:#bb9af7,pointer:#f7768e' \
    --border rounded \
    --border-label ' sessions ' \
    --prompt '  ' \
    --pointer '▶' \
    --header '  ctrl-a  all    ctrl-t  tmux    ctrl-z  zoxide' \
    --bind 'j:down,k:up' \
    --bind 'ctrl-a:change-prompt(  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-z:change-prompt(  )+reload(sesh list -z --icons)'
)\""

# Window navigation
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-. next-window
bind -n M-, previous-window

# ===== Copy Mode =====
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi C-d send -X halfpage-down
bind -T copy-mode-vi g   send -X top-line
bind -T copy-mode-vi G   send -X bottom-line
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line
bind C run-shell "~/.local/bin/tmux-copy-last-output && tmux display-message 'Copied last output!'"

# ===== Plugins =====
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ===== Tokyo Night =====
set -g @tokyo-night-tmux_theme night
set -g @tokyo-night-tmux_transparent 0
set -g @tokyo-night-tmux_window_id_style hide
set -g @tokyo-night-tmux_pane_id_style hide
set -g @tokyo-night-tmux_show_datetime 1
set -g @tokyo-night-tmux_date_format MDD
set -g @tokyo-night-tmux_time_format 12H
set -g @tokyo-night-tmux_show_hostname 0
set -g @tokyo-night-tmux_show_music 0
set -g @tokyo-night-tmux_show_netspeed 0
set -g @tokyo-night-tmux_show_path 0
set -g @tokyo-night-tmux_show_battery_widget 0
set -g @tokyo-night-tmux_window_tidy_icons 0

# ===== Prefix Highlight =====
set -g @prefix_highlight_fg '#15161e'
set -g @prefix_highlight_bg '#7aa2f7'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=#15161e,bg=#e0af68'
set -g @prefix_highlight_prefix_prompt 'PREFIX'
set -g @prefix_highlight_copy_prompt 'COPY'

# ===== Session Persistence =====
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-dir '~/.tmux/resurrect'
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'
set -g @continuum-boot 'off'

run '~/.tmux/plugins/tpm/tpm'
